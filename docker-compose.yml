version: "3.9"

services:
  app:
    build: .
    container_name: rag_app
    ports:
      - "8001:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: always

  db:
    image: ankane/pgvector
    container_name: rag_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d 
    restart: always

volumes:
  pgdata: